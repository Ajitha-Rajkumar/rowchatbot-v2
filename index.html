<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jio ROW & Demand Note Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f0f4f8;
            --bg-card: #f0f4f8;
            --text-primary: #0a1f44;
            --text-secondary: #3a5078;
            --border: #d0dae8;
            --border-light: #e4ecf4;
            --bot-bubble: #ffffff;
            --bot-bubble-border: #d0dae8;
            --user-bubble: linear-gradient(135deg, #0a2885, #1a3fa0);
            --accent: #0a2885;
            --accent-dark: #061a5e;
            --input-bg: #ffffff;
            --input-border: #c0ccdd;
            --tag-bg: #e0e8f5;
            --tag-color: #0a2885;
            --tip-bg: #fffae6;
            --tip-border: #ffe380;
            --info-bg: #e6f5fa;
            --info-border: #b3dff0;
            --step-bg: #eef2f8;
            --header-bg: linear-gradient(135deg, #0078D4 0%, #006CBE 100%);
            --body-bg: #0078D4;
            --shadow: 0 25px 60px rgba(0,0,0,0.3);
            --fiber-red: #e4002b;
            --fiber-amber: #f5a623;
            --fiber-cyan: #00b8d4;
        }

        [data-theme="dark"] {
            --bg-primary: #0f1a30;
            --bg-secondary: #0a1324;
            --bg-card: #162040;
            --text-primary: #c8d6f0;
            --text-secondary: #8a9ec0;
            --border: #2a3a5a;
            --border-light: #1a2a48;
            --bot-bubble: #0f1a30;
            --bot-bubble-border: #2a3a5a;
            --accent: #6b8fd4;
            --accent-dark: #5a7fc0;
            --input-bg: #162040;
            --input-border: #2a3a5a;
            --tag-bg: #1a2e5a;
            --tag-color: #6b8fd4;
            --tip-bg: #2a2200;
            --tip-border: #554400;
            --info-bg: #0a2030;
            --info-border: #1a3a50;
            --step-bg: #162040;
            --header-bg: linear-gradient(135deg, #005a9e 0%, #004578 100%);
            --body-bg: #003a6e;
            --shadow: 0 25px 60px rgba(0,0,0,0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--body-bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: background 0.3s;
            position: relative;
            overflow: hidden;
        }

        body > * { position: relative; z-index: 1; }

        .chatbot-container {
            width: 100%;
            max-width: 520px;
            height: 92vh;
            max-height: 780px;
            background: var(--bg-primary);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: background 0.3s, box-shadow 0.3s;
            border: 1px solid rgba(0,0,0,0.08);
        }

        /* Header */
        .chat-header {
            background: var(--header-bg);
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
            border-bottom: none;
        }

        /* Fiber accent stripes below header */
        .chat-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg,
                #e4002b 0%, #e4002b 33%,
                #f5a623 33%, #f5a623 66%,
                #00b8d4 66%, #00b8d4 100%);
        }

        .bot-avatar {
            width: 42px; height: 42px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            background: none;
            border: none;
        }

        .bot-avatar .jio-logo {
            width: 42px; height: 42px;
            border-radius: 50%;
            object-fit: cover;
        }

        [data-theme="dark"] .bot-avatar {
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .header-info { flex: 1; }
        .header-info h1 { color: #fff; font-size: 15px; font-weight: 600; letter-spacing: 0.3px; }
        .header-info h1 .jio-text { font-weight: 700; }
        [data-theme="dark"] .header-info h1 { color: #c8d6f0; }
        .header-info p { color: rgba(255,255,255,0.75); font-size: 11.5px; margin-top: 2px; display: flex; align-items: center; gap: 5px; }
        [data-theme="dark"] .header-info p { color: #8a9ec0; }

        .online-dot { width: 6px; height: 6px; background: #36b37e; border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

        .header-actions { display: flex; gap: 6px; }
        .header-btn {
            width: 34px; height: 34px; border-radius: 10px;
            background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.15);
            color: #fff; font-size: 13px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .header-btn:hover { background: rgba(255,255,255,0.22); }
        [data-theme="dark"] .header-btn { background: rgba(107,143,212,0.1); border-color: rgba(107,143,212,0.2); color: #c8d6f0; }

        /* Chat Messages */
        .chat-messages {
            flex: 1; overflow-y: auto; padding: 16px 14px;
            background: var(--bg-secondary); scroll-behavior: smooth; transition: background 0.3s;
        }

        .chat-messages::-webkit-scrollbar { width: 5px; }
        .chat-messages::-webkit-scrollbar-track { background: transparent; }
        .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .message { display: flex; gap: 8px; margin-bottom: 14px; animation: fadeInUp 0.3s ease; }
        @keyframes fadeInUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
        .message.bot { align-items: flex-start; }
        .message.user { flex-direction: row-reverse; }

        .msg-avatar {
            width: 30px; height: 30px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; font-size: 13px;
        }
        .message.bot .msg-avatar { background: var(--accent); color: #fff; }
        [data-theme="dark"] .message.bot .msg-avatar { background: #162040; color: #6b8fd4; }
        .message.user .msg-avatar { background: #1a3fa0; color: #fff; }

        .msg-bubble {
            max-width: 84%; padding: 11px 14px; border-radius: 14px;
            font-size: 13px; line-height: 1.55; color: var(--text-primary); transition: all 0.3s;
        }
        .message.bot .msg-bubble {
            background: var(--bot-bubble); border: 1px solid var(--bot-bubble-border);
            border-top-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.03);
        }
        .message.user .msg-bubble {
            background: var(--user-bubble); color: #fff; border-top-right-radius: 4px; border: none;
        }
        .msg-bubble strong { font-weight: 600; }

        .msg-bubble .step-card {
            background: var(--step-bg); border-radius: 8px; padding: 9px 12px;
            margin: 6px 0; border-left: 3px solid var(--accent);
        }
        .msg-bubble .step-num {
            display: inline-flex; width: 20px; height: 20px; border-radius: 50%;
            background: var(--accent); color: #fff; font-size: 10px; font-weight: 600;
            align-items: center; justify-content: center; margin-right: 7px; flex-shrink: 0;
        }
        .msg-bubble .step-row { display: flex; align-items: flex-start; margin-bottom: 3px; }

        .msg-bubble .tip-box {
            background: var(--tip-bg); border: 1px solid var(--tip-border); border-radius: 8px;
            padding: 7px 10px; margin-top: 6px; font-size: 12px; display: flex; align-items: flex-start; gap: 7px;
        }
        .msg-bubble .tip-box i { color: #ff991f; margin-top: 2px; }

        .msg-bubble .info-box {
            background: var(--info-bg); border: 1px solid var(--info-border); border-radius: 8px;
            padding: 7px 10px; margin-top: 6px; font-size: 12px;
        }

        /* Welcome about card */
        .welcome-about {
            background: linear-gradient(135deg, var(--info-bg), var(--bg-primary));
            border: 1px solid var(--info-border);
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 12px;
            font-size: 12.5px;
            line-height: 1.65;
            color: var(--text-secondary);
            animation: fadeInUp 0.4s ease;
        }
        .welcome-about .welcome-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        .welcome-about .welcome-title img {
            width: 26px; height: 26px; border-radius: 50%;
        }
        .welcome-about strong { color: var(--accent); font-weight: 600; }

        .msg-bubble .role-tag {
            display: inline-flex; padding: 1px 7px; background: var(--tag-bg); color: var(--tag-color);
            border-radius: 4px; font-size: 11px; font-weight: 500; margin: 1px 1px;
        }
        .msg-bubble .channel-green { color: #006644; background: #e3fcef; }
        .msg-bubble .channel-orange { color: #974f0c; background: #fff4e5; }
        .msg-bubble .channel-red { color: #bf2600; background: #ffebe6; }
        [data-theme="dark"] .msg-bubble .channel-green { color: #a6e3a1; background: #1a3a2a; }
        [data-theme="dark"] .msg-bubble .channel-orange { color: #fab387; background: #3a2a1a; }
        [data-theme="dark"] .msg-bubble .channel-red { color: #f38ba8; background: #3a1a1a; }

        .msg-bubble .field-list { margin: 4px 0; padding-left: 16px; }
        .msg-bubble .field-list li { margin-bottom: 2px; font-size: 12.5px; }
        .msg-bubble .field-list li.mandatory::after { content: ""; }

        /* Quick Buttons */
        .quick-buttons { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 10px; }
        .quick-btn {
            display: inline-flex; align-items: center; gap: 6px; padding: 8px 13px;
            background: var(--bg-primary); border: 1.5px solid var(--accent); border-radius: 20px;
            font-size: 12px; font-weight: 500; color: var(--accent); cursor: pointer;
            transition: all 0.2s; font-family: 'Inter', sans-serif;
        }
        .quick-btn:hover {
            background: var(--accent); color: #fff;
            transform: translateY(-1px); box-shadow: 0 3px 12px rgba(0,120,212,0.3);
        }
        .quick-btn i { font-size: 11px; }

        .sub-buttons { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
        .sub-btn {
            padding: 6px 12px; background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 8px; font-size: 11.5px; color: var(--text-secondary); cursor: pointer;
            transition: all 0.2s; font-family: 'Inter', sans-serif; font-weight: 500;
        }
        .sub-btn:hover { background: var(--tag-bg); border-color: var(--accent); color: var(--accent); }

        /* Typing */
        .typing-indicator { display: flex; gap: 4px; padding: 4px 0; }
        .typing-indicator span {
            width: 6px; height: 6px; background: var(--text-secondary); border-radius: 50%;
            animation: typingBounce 1.4s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: .2s; }
        .typing-indicator span:nth-child(3) { animation-delay: .4s; }
        @keyframes typingBounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

        /* Input Area */
        .chat-input-area {
            padding: 12px 14px; background: var(--bg-primary); border-top: 1px solid var(--border-light);
            display: flex; gap: 8px; align-items: center; transition: all 0.3s;
        }
        .chat-input-area input {
            flex: 1; border: 1.5px solid var(--input-border); border-radius: 12px;
            padding: 10px 14px; font-size: 13px; font-family: 'Inter', sans-serif;
            color: var(--text-primary); background: var(--input-bg); outline: none; transition: all 0.2s;
        }
        .chat-input-area input:focus { border-color: var(--accent); }
        .chat-input-area input::placeholder { color: var(--text-secondary); opacity: 0.6; }

        .send-btn {
            width: 40px; height: 40px; border-radius: 12px;
            background: var(--accent); border: none; color: #fff; font-size: 15px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; flex-shrink: 0;
        }
        .send-btn:hover { transform: scale(1.05); box-shadow: 0 3px 12px rgba(0,120,212,0.4); }

        @media (max-width: 560px) {
            body { padding: 0; }
            .chatbot-container { max-width: 100%; height: 100vh; max-height: 100vh; border-radius: 0; }
        }
    </style>
</head>
<body>
    <div class="chatbot-container" id="chatContainer">
        <div class="chat-header">
            <div class="bot-avatar">
                <img class="jio-logo" src="logo.png" alt="Jio">
            </div>
            <div class="header-info">
                <h1><span class="jio-text">Jio</span> Fiber ROW Assistant</h1>
                <p><span class="online-dot"></span> Online — ROW & Demand Note</p>
            </div>
            <div class="header-actions">
                <button class="header-btn" onclick="goBack()" title="Back"><i class="fas fa-arrow-left"></i></button>
                <button class="header-btn" onclick="clearChat()" title="Clear Chat"><i class="fas fa-trash-can"></i></button>
                <button class="header-btn" onclick="toggleTheme()" title="Toggle Dark/Light" id="themeBtn"><i class="fas fa-moon"></i></button>
            </div>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="Type a question..." autocomplete="off">
            <button class="send-btn" onclick="handleUserInput()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        let navHistory = [];

        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleUserInput(); });

        // ==================== KNOWLEDGE BASE ====================
        const flows = {

            // ========== ROW AUTHORITY CREATION & RATE UPDATE ==========
            authority_rate: {
                welcome: `Here is information on <strong>ROW Authority Creation & Rate Maintenance</strong>. Please select an option:`,
                sub_options: [
                    { label: "Create ROW Authority", action: "authority_create" },
                    { label: "Vendor Contract Mapping", action: "authority_vendor" },
                    { label: "Manage Authority Cost", action: "rate_update" }
                ]
            },
            authority_create: {
                response: `Here's how to <strong>create a ROW Authority</strong>:<br><span class="role-tag">Role: ROW Executive</span> &nbsp; <span class="role-tag">System: K2 (Web)</span>

<div class="step-card"><div class="step-row"><span class="step-num">1</span><span>Navigate to <strong>PUBLIC ROW</strong> → <strong>Manage Authority</strong> on the K2 screen.<br>
&nbsp;&nbsp;• Click <strong>"Add Authority"</strong> to create a new authority<br>
&nbsp;&nbsp;• Click <strong>"Edit Authority"</strong> to update an existing authority</span></div></div>

<div class="step-card"><div class="step-row"><span class="step-num">2</span><span><strong>For New Authority:</strong> Under the <em>Unregistered Authority</em> tab, fill in:<ul class="field-list">
<li class="mandatory">Authority Category</li>
<li class="mandatory">Authority Name</li>
<li class="mandatory">Authority Address</li>
<li class="mandatory">JIO State Mapping</li>
<li class="mandatory">MP Mapping</li>
</ul><strong>Save Authority</strong></span></div></div>

<div class="step-card"><div class="step-row"><span class="step-num">3</span><span><strong>For Existing Authority:</strong> Under the <em>Registered Authority</em> tab, search and select the authority. Fill in:<ul class="field-list">
<li>Authority Category</li>
<li>Authority Name</li>
<li>Authority Address</li>
<li>JIO State Mapping</li>
<li>MP Mapping</li>
</ul><strong>Save Authority</strong></span></div></div>

<div class="step-card"><div class="step-row"><span class="step-num">4</span><span>Confirmation message displayed: <strong>"Authority Saved Successfully"</strong>.</span></div></div>

<div class="tip-box"><i class="fas fa-lightbulb"></i><span>After saving, the authority must be mapped to GL Code & Contract Type. See <strong>Vendor Contract Mapping</strong>.</span></div>`,
                sub_options: [
                    { label: "Vendor Contract Mapping", action: "authority_vendor" },
                    { label: "Manage Authority Cost", action: "rate_update" },
                    { label: "Back to Main Menu", action: "home" }
                ]
            },
            authority_vendor: {
                response: `Here's how to do <strong>Vendor Contract Type Mapping</strong>:<br><span class="role-tag">Role: ROW Executive</span> &nbsp; <span class="role-tag">System: K2 (Web)</span>

<div class="step-card"><div class="step-row"><span class="step-num">1</span><span>Navigate to <strong>PUBLIC ROW</strong> → <strong>Manage Authority</strong> → <strong>"Manage Authority Vendor ContractType Mapping"</strong> on the K2 screen.<br>
&nbsp;&nbsp;• Review details — Authority Category, Authority Name, Address<br>
&nbsp;&nbsp;• Map the Authority to <strong>GL Code</strong> and <strong>Contract Type</strong><br>
<strong>Save</strong></span></div></div>

<div class="info-box">This mapping is required to specify ROW charges under different authority categories and GL accounts.</div>`,
                sub_options: [
                    { label: "Create ROW Authority", action: "authority_create" },
                    { label: "Manage Authority Cost", action: "rate_update" },
                    { label: "Back to Main Menu", action: "home" }
                ]
            },
            rate_update: {
                response: `Here's how to <strong>Manage Authority Cost</strong>:<br><span class="role-tag">Role: State FC&A Lead</span> &nbsp; <span class="role-tag">System: K2 (Web)</span>

<div class="step-card"><div class="step-row"><span class="step-num">1</span><span>Navigate to <strong>PUBLIC ROW</strong> → <strong>Manage Authority</strong> → <strong>Manage Authority Cost</strong> on the K2 screen and select the Authority.</span></div></div>

<div class="step-card"><div class="step-row"><span class="step-num">2</span><span>Select Circle, Authority and fill in the below <strong>Rate Configuration</strong> details:<ul class="field-list">
<li class="mandatory">Methodology (Aerial, Common, Crossing, HDD, Micro Trenching, Moling, Open Trenching, UG)</li>
<li class="mandatory">Construction Type (HDD, MT, OT)</li>
<li class="mandatory">Ownership (OWN, LEASED)</li>
<li class="mandatory">Fixed Charges</li>
<li>Fixed Charges Higher Variance (%)</li>
<li>Fixed Charges Lower Variance (% in Negative)</li>
<li>Recurring Charges</li>
<li>Recurring Charges Escalation (%)</li>
<li>Discount (%)</li>
</ul><strong>Add</strong></span></div></div>

<br><strong>Approve Authority Cost</strong><br><span class="role-tag">Role: State FC&A Head</span> &nbsp; <span class="role-tag">System: K2 (Web)</span>

<div class="step-card"><div class="step-row"><span class="step-num">3</span><span>Navigate to <strong>PUBLIC ROW</strong> → <strong>Manage Authority Cost</strong>. Review the rate details:<br>
&nbsp;&nbsp;• Methodology<br>
&nbsp;&nbsp;• Construction Type<br>
&nbsp;&nbsp;• Ownership<br>
&nbsp;&nbsp;• Fixed Charges<br>
&nbsp;&nbsp;• Recurring Charges<br>
&nbsp;&nbsp;• Variance percentages<br>
<strong>Approve</strong></span></div></div>`,
                sub_options: [
                    { label: "Create ROW Authority", action: "authority_create" },
                    { label: "Vendor Contract Mapping", action: "authority_vendor" },
                    { label: "Back to Main Menu", action: "home" }
                ]
            },

            // ========== ROW APPLICATION CREATION & PROCESSING ==========
            application: {
                welcome: `Here is information on <strong>ROW Application Creation & Processing</strong>. Please select an option:`,
                sub_options: [
                    { label: "Create ROW Application", action: "app_create" },
                    { label: "Update Authority / Span Split", action: "app_span_split" },
                    { label: "Map SPAN to Multiple Authorities", action: "app_span_mapping" },
                    { label: "Application Processing Fee", action: "app_fee" }
                ]
            },
            app_create: {
                response: `Here's how to <strong>create a ROW Application</strong>:<br><span class="role-tag">Role: ROW Executive</span> &nbsp; <span class="role-tag">System: K2 (Web)</span>

<div class="step-card"><div class="step-row"><span class="step-num">1</span><span>Navigate to <strong>PUBLIC ROW</strong> → <strong>Manage ROW Draft Application</strong> on the K2 screen.</span></div></div>

<div class="step-card"><div class="step-row"><span class="step-num">2</span><span>Select <strong>DIT</strong> or <strong>NON DIT</strong> Draft Application.</span></div></div>

<div class="step-card"><div class="step-row"><span class="step-num">3</span><span>Search for <strong>Link</strong> by selecting the below parameters:<br>
• Phase<br>
• Jio State<br>
• Political State<br>
• MP<br>
• Authority Category<br>
• Authority<br>
• Network Category<br>
• Network Type</span></div></div>

<div class="step-card"><div class="step-row"><span class="step-num">4</span><span>Click <strong>"Get Details"</strong> — SPAN / CROSSING / POLE details eligible for ROW will be displayed with:<br>
• Feature ID<br>
• Length<br>
• UOM<br>
• Construction Type<br>
• Construction Methodology</span></div></div>

<div class="step-card"><div class="step-row"><span class="step-num">5</span><span>Select the required <strong>SPAN / CROSSING / POLE</strong> segments (tick checkboxes) and click <strong>"Generate Application"</strong>.</span></div></div>

<div class="step-card"><div class="step-row"><span class="step-num">6</span><span>A success message appears with the <strong>Application ID</strong>. Click OK.</span></div></div>

<div class="tip-box"><i class="fas fa-lightbulb"></i><span>Spans can be <strong>split</strong>, <strong>authority updated</strong>, or <strong>applications merged</strong> before generating the final application.</span></div>

<br><strong>Merge Applications</strong><br><span class="role-tag">Role: ROW Executive</span> &nbsp; <span class="role-tag">System: K2 (Web)</span>

<div class="step-card"><div class="step-row"><span class="step-num">7</span><span>Navigate to <strong>PUBLIC ROW</strong> → <strong>Manage Application OneFiber</strong> on the K2 screen.</span></div></div>

<div class="step-card"><div class="step-row"><span class="step-num">8</span><span>Select the <strong>multiple applications</strong> if required to be merged.</span></div></div>

<div class="step-card"><div class="step-row"><span class="step-num">2</span><span>Select the required <strong>Role</strong> for access.</span></div></div>

<div class="step-card"><div class="step-row"><span class="step-num">3</span><span>The request will be sent to <strong>NHQ Intercity / Intracity Super Admin</strong> for approval.</span></div></div>

                sub_options: [
                    { label: "Back to Main Menu", action: "home" }
                ]
            },

            // ========== ROLES & TASKS AND GLOSSARY ==========
            roles_glossary: {
                welcome: `Please select an option:`,
                sub_options: [
                    { label: "Roles & Tasks", action: "roles_tasks" },
                    { label: "Abbreviations / Glossary", action: "glossary" }
                ]
            },
            roles_tasks: {
                directResponse: true,
                response: `<strong>Roles & Their Tasks</strong> in the ROW & Demand Note system:

</div>`,
                sub_options: [
                    { label: "Abbreviations / Glossary", action: "glossary" },
                    { label: "Back to Main Menu", action: "home" }
                ]
            },
            glossary: {
                directResponse: true,
                response: `<strong>Abbreviations / Glossary</strong>:

<div class="step-card">
<strong>ROW</strong> – Right of Way<br>
<strong>K2</strong> – Workflow Management Platform<br>

                sub_options: [
                    { label: "Roles & Tasks", action: "roles_tasks" },
                    { label: "Back to Main Menu", action: "home" }
                ]
            }
        };

        // ==================== MAIN MENU ====================
        const mainMenuOptions = [
            { label: '<i class="fas fa-key"></i> Get Access', action: 'get_access' },
            { label: '<i class="fas fa-building"></i> ROW Authority Creation & Rate Update', action: 'authority_rate' },
            { label: '<i class="fas fa-file-lines"></i> ROW Application & Processing', action: 'application' },
            { label: '<i class="fas fa-file-invoice"></i> Demand Note Creation', action: 'dn_creation' },
            { label: '<i class="fas fa-check-double"></i> DN Approval & Payment', action: 'dn_approval' },
            { label: '<i class="fas fa-book"></i> Roles & Glossary', action: 'roles_glossary' }
        ];

        // ==================== CHAT FUNCTIONS ====================
        function appendMessage(content, isBot) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isBot ? 'bot' : 'user'}`;
            const avatar = document.createElement('div');
            avatar.className = 'msg-avatar';
            avatar.innerHTML = isBot ? '<i class="fas fa-road"></i>' : '<i class="fas fa-user"></i>';
            const bubble = document.createElement('div');
            bubble.className = 'msg-bubble';
            bubble.innerHTML = content;
            msgDiv.appendChild(avatar);
            msgDiv.appendChild(bubble);
            chatMessages.appendChild(msgDiv);
            scrollToBottom();
        }

        function addMessage(content, isBot = true, withTyping = true, callback = null) {
            if (withTyping && isBot) {
                showTypingIndicator();
                const delay = 500 + Math.random() * 300;
                setTimeout(() => {
                    removeTypingIndicator();
                    appendMessage(content, isBot);
                    if (callback) callback();
                }, delay);
            } else {
                appendMessage(content, isBot);
                if (callback) callback();
            }
        }

        function addButtons(options, isMainMenu = false) {
            showTypingIndicator();
            setTimeout(() => {
                removeTypingIndicator();
                const msgDiv = document.createElement('div');
                msgDiv.className = 'message bot';
                const avatar = document.createElement('div');
                avatar.className = 'msg-avatar';
                avatar.innerHTML = '<i class="fas fa-road"></i>';
                const bubble = document.createElement('div');
                bubble.className = 'msg-bubble';
                const btnContainer = document.createElement('div');
                btnContainer.className = isMainMenu ? 'quick-buttons' : 'sub-buttons';
                options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = isMainMenu ? 'quick-btn' : 'sub-btn';
                    btn.innerHTML = opt.label;
                    btn.onclick = () => handleAction(opt.action, opt.label);
                    btnContainer.appendChild(btn);
                });
                bubble.appendChild(btnContainer);
                msgDiv.appendChild(avatar);
                msgDiv.appendChild(bubble);
                chatMessages.appendChild(msgDiv);
                scrollToBottom();
            }, 250);
        }

        function showTypingIndicator() {
            if (document.getElementById('typingIndicator')) return;
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message bot'; msgDiv.id = 'typingIndicator';
            const avatar = document.createElement('div');
            avatar.className = 'msg-avatar';
            avatar.innerHTML = '<i class="fas fa-road"></i>';
            const bubble = document.createElement('div');
            bubble.className = 'msg-bubble';
            bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
            msgDiv.appendChild(avatar); msgDiv.appendChild(bubble);
            chatMessages.appendChild(msgDiv); scrollToBottom();
        }

        function removeTypingIndicator() {
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }

        function scrollToBottom() {
            setTimeout(() => { chatMessages.scrollTop = chatMessages.scrollHeight; }, 50);
        }

        // ==================== ACTION HANDLERS ====================
        function handleAction(action, label) {
            if (label && action !== 'home') {
                appendMessage(label.replace(/<[^>]*>/g, '').trim(), false);
            }

            navHistory.push(action);

            if (action === 'home') {
                appendMessage("Main menu", false);
                showMainMenu();
                return;
            }

            const flow = flows[action];
            if (!flow) return;

            if (flow.directResponse && flow.response) {
                addMessage(flow.response, true, true, () => {
                if (flow.sub_options) addButtons(flow.sub_options);
                });
            } else if (flow.welcome) {
                addMessage(flow.welcome, true, true, () => {
                if (flow.sub_options) addButtons(flow.sub_options);
                });
            } else if (flow.response) {
                addMessage(flow.response, true, true, () => {
                if (flow.sub_options) addButtons(flow.sub_options);
                });
            }
        }

        function showMainMenu() {
            // Show about card only on first load
            if (chatMessages.children.length === 0) {
                const aboutCard = document.createElement('div');
                aboutCard.className = 'welcome-about';
                aboutCard.innerHTML = `
                    <div class="welcome-title">
                        <img src="logo.png" alt="Jio">
                        About ROW Application
                    </div>
                    The <strong>ROW (Right of Way)</strong> Application is a web-based module within the <strong>Infra Build</strong> platform (Jio Digital Life) that enables ROW Executives to create, manage, and submit Right of Way applications for fiber optic network deployments. The application integrates with <strong>K2</strong> workflow engine, <strong>GIS</strong> (Geographic Information System) for geographic span management and <strong>SAP</strong> for payment to authorities.<br><br>
                    This chatbot provides a comprehensive step-by-step guide covering the complete lifecycle of a ROW Application — from initial creation through span management, application merging, submission, joint survey, and processing fee capture.`;
                chatMessages.appendChild(aboutCard);
            }
            addMessage(`Welcome! Please choose a topic below or type a question.`, true, true, () => {
            addButtons(mainMenuOptions, true);
            });
        }

        // ==================== HEADER ACTIONS ====================
        function clearChat() {
            chatMessages.innerHTML = '';
            navHistory = [];
            showMainMenu();
        }

        function goBack() {
            if (navHistory.length > 1) {
                navHistory.pop(); // remove current
                const prev = navHistory.pop(); // get previous
                handleAction(prev, null);
            } else {
                clearChat();
            }
        }

        function toggleTheme() {
            const container = document.getElementById('chatContainer');
            const btn = document.getElementById('themeBtn');
            if (document.documentElement.getAttribute('data-theme') === 'dark') {
                document.documentElement.removeAttribute('data-theme');
                btn.innerHTML = '<i class="fas fa-moon"></i>';
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                btn.innerHTML = '<i class="fas fa-sun"></i>';
            }
        }

        // ======= SEQUENTIAL PROCESS FLOW (for pre/post navigation) =======
        const processFlow = [
            { key: 'authority_create', match: (l) => l.includes('authority') && (l.includes('creat') || l.includes('add') || l.includes('save')) && !l.includes('cost') && !l.includes('vendor') },
            { key: 'authority_vendor', match: (l) => l.includes('vendor') || (l.includes('contract') && l.includes('map')) },
            { key: 'rate_update',      match: (l) => l.includes('authority cost') || l.includes('rate config') || (l.includes('manage') && l.includes('cost')) },
            { key: 'app_create',       match: (l) => l.includes('application') && (l.includes('creat') || l.includes('generat') || l.includes('draft')) },
            { key: 'app_span_split',   match: (l) => (l.includes('span') && l.includes('split')) || l.includes('update authority') },
            { key: 'app_span_mapping', match: (l) => l.includes('span') && (l.includes('map') || l.includes('multiple')) },
            { key: 'app_ack',          match: (l) => l.includes('acknowledgement') || (l.includes('ack') && !l.includes('back')) },
            { key: 'app_survey',       match: (l) => l.includes('survey') },
            { key: 'app_fee',          match: (l) => l.includes('processing fee') || l.includes('application fee') || (l.includes('fee') && l.includes('applic')) },
            { key: 'dn_creation',      match: (l) => l.includes('demand note') || l.includes('dn creat') || l.includes('demand note creat') },
            { key: 'dn_approval',      match: (l) => (l.includes('dn') || l.includes('demand')) && (l.includes('approv') || l.includes('payment')) }
        ];

        function findFlowNavigation(lower) {
            const isAfter  = /\b(after|next|post|then|following|once|completed|done|finish|later)\b/.test(lower);
            const isBefore = /\b(before|previous|prior|pre|preceding)\b/.test(lower);

            if (!isAfter && !isBefore) return null;

            for (let i = 0; i < processFlow.length; i++) {
                if (processFlow[i].match(lower)) {
                    if (isAfter  && i < processFlow.length - 1) return processFlow[i + 1].key;
                    if (isBefore && i > 0)                      return processFlow[i - 1].key;
                    return null;
                }
            }
            return null;
        }

        // ==================== TEXT INPUT HANDLER ====================
        function handleUserInput() {
            const text = userInput.value.trim();
            if (!text) return;
            appendMessage(text, false);
            userInput.value = '';
            const lower = text.toLowerCase();

            // Check for pre/post navigation questions
            const navResult = findFlowNavigation(lower);
            if (navResult) {
                handleAction(navResult, null);
                return;
            }

            if (lower.includes('access') || lower.includes('login') || lower.includes('register') || lower.includes('sign up')) {
                handleAction('get_access', null);
            } else if (lower.includes('role') && lower.includes('task')) {
                handleAction('roles_tasks', null);
            } else if (lower.includes('glossary') || lower.includes('abbreviat') || lower.includes('full form')) {
                handleAction('glossary', null);
            } else if (lower.includes('role')) {
                handleAction('roles_glossary', null);
            } else if (lower.includes('authority') && (lower.includes('creat') || lower.includes('add'))) {
                handleAction('authority_create', null);
            } else if (lower.includes('authority') && lower.includes('cost')) {
                handleAction('rate_update', null);
            } else if (lower.includes('vendor') && lower.includes('contract')) {
                handleAction('authority_vendor', null);
            } else if (lower.includes('authority') && (lower.includes('manage') || lower.includes('rate') || lower.includes('maintenance'))) {
                handleAction('authority_rate', null);
            } else if (lower.includes('authority')) {
                handleAction('authority_rate', null);
            } else if (lower.includes('rate') || lower.includes('cost') || lower.includes('methodology')) {
                handleAction('rate_update', null);
            } else if (lower.includes('application') && (lower.includes('creat') || lower.includes('generat') || lower.includes('draft'))) {
                handleAction('app_create', null);
            } else if (lower.includes('span') && (lower.includes('map') || lower.includes('multiple authorit'))) {
                handleAction('app_span_mapping', null);
            } else if (lower.includes('span') && (lower.includes('split') || lower.includes('update'))) {
                handleAction('app_span_split', null);
            } else if (lower.includes('merge')) {
                handleAction('app_merge', null);
            } else if (lower.includes('acknowledgement') || lower.includes('ack')) {
                handleAction('app_ack', null);
            } else if (lower.includes('joint survey') || lower.includes('survey')) {
                handleAction('app_survey', null);
            } else if (lower.includes('processing fee') || lower.includes('application fee')) {
                handleAction('app_fee', null);
            } else if (lower.includes('demand note') && (lower.includes('creat') || lower.includes('upload') || lower.includes('new') || lower.includes('supplementary'))) {
                handleAction('dn_creation', null);
            } else if (lower.includes('checklist') || lower.includes('channel') || lower.includes('green') || lower.includes('orange') || lower.includes('red channel')) {
                handleAction('dn_approval', null);
            } else if ((lower.includes('approval') || lower.includes('approve')) && (lower.includes('dn') || lower.includes('demand'))) {
                handleAction('dn_approval', null);
            } else if (lower.includes('payment') && (lower.includes('dn') || lower.includes('demand'))) {
                handleAction('dn_approval', null);
            } else if (lower.includes('permission') || lower.includes('noc') || lower.includes('refund')) {
                handleAction('dn_approval', null);
            } else if (lower.includes('executor')) {
                handleAction('dn_approval', null);
            } else if (lower.includes('demand note') || lower.includes('demand') || lower.includes(' dn ') || lower === 'dn') {
                handleAction('dn_creation', null);
            } else if (lower.includes('row application') || lower.includes('row app') || lower.includes('application')) {
                handleAction('application', null);
            } else if (lower.includes('bg') && (lower.includes('return') || lower.includes('guarantee'))) {
                handleAction('dn_approval', null);
            } else if (lower.includes('hello') || lower.includes('hi') || lower.includes('hey') || lower.includes('help') || lower.includes('menu') || lower.includes('start')) {
                showMainMenu();
            } else {
                addMessage(`That topic was not found. Here are the available topics — please select one to get started:`, true, true, () => {
                addButtons(mainMenuOptions, true);
                });
            }
        }

        // ==================== INIT ====================
        window.onload = () => { showMainMenu(); };
    </script>
</body>
