<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROW & Demand Note Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f7f8fa;
            --bg-card: #f4f5f7;
            --text-primary: #172b4d;
            --text-secondary: #42526e;
            --border: #e4e7eb;
            --border-light: #ebecf0;
            --bot-bubble: #ffffff;
            --bot-bubble-border: #e4e7eb;
            --user-bubble: linear-gradient(135deg, #0052cc, #0747a6);
            --accent: #0052cc;
            --accent-dark: #0747a6;
            --input-bg: #ffffff;
            --input-border: #dfe1e6;
            --tag-bg: #deebff;
            --tag-color: #0052cc;
            --tip-bg: #fffae6;
            --tip-border: #ffe380;
            --info-bg: #e6fcff;
            --info-border: #b3f5ff;
            --step-bg: #f4f5f7;
            --header-bg: linear-gradient(135deg, #0052cc 0%, #0747a6 100%);
            --body-bg: linear-gradient(135deg, #0a1628 0%, #1a2a4a 50%, #0d1f3c 100%);
            --shadow: 0 25px 60px rgba(0,0,0,0.4);
        }

        [data-theme="dark"] {
            --bg-primary: #1e1e2e;
            --bg-secondary: #181825;
            --bg-card: #313244;
            --text-primary: #cdd6f4;
            --text-secondary: #a6adc8;
            --border: #45475a;
            --border-light: #313244;
            --bot-bubble: #1e1e2e;
            --bot-bubble-border: #45475a;
            --accent: #89b4fa;
            --accent-dark: #74c7ec;
            --input-bg: #313244;
            --input-border: #45475a;
            --tag-bg: #1e3a5f;
            --tag-color: #89b4fa;
            --tip-bg: #3a3000;
            --tip-border: #665500;
            --info-bg: #0a2a33;
            --info-border: #1a4a5a;
            --step-bg: #313244;
            --header-bg: linear-gradient(135deg, #1e1e2e 0%, #181825 100%);
            --body-bg: linear-gradient(135deg, #11111b 0%, #181825 100%);
            --shadow: 0 25px 60px rgba(0,0,0,0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--body-bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: background 0.3s;
        }

        .chatbot-container {
            width: 100%;
            max-width: 520px;
            height: 92vh;
            max-height: 780px;
            background: var(--bg-primary);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: background 0.3s, box-shadow 0.3s;
        }

        /* Header */
        .chat-header {
            background: var(--header-bg);
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            position: relative;
            border-bottom: 1px solid var(--border);
        }

        .bot-avatar {
            width: 40px; height: 40px;
            background: rgba(255,255,255,0.15);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; color: #fff; flex-shrink: 0;
            border: 1px solid rgba(255,255,255,0.2);
        }

        [data-theme="dark"] .bot-avatar {
            background: rgba(137,180,250,0.15);
            border-color: rgba(137,180,250,0.3);
        }

        .header-info { flex: 1; }
        .header-info h1 { color: #fff; font-size: 15px; font-weight: 600; }
        [data-theme="dark"] .header-info h1 { color: #cdd6f4; }
        .header-info p { color: rgba(255,255,255,0.7); font-size: 11.5px; margin-top: 1px; display: flex; align-items: center; gap: 5px; }
        [data-theme="dark"] .header-info p { color: #a6adc8; }

        .online-dot { width: 6px; height: 6px; background: #36b37e; border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

        .header-actions { display: flex; gap: 6px; }
        .header-btn {
            width: 34px; height: 34px; border-radius: 10px;
            background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.15);
            color: #fff; font-size: 13px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .header-btn:hover { background: rgba(255,255,255,0.22); }
        [data-theme="dark"] .header-btn { background: rgba(137,180,250,0.1); border-color: rgba(137,180,250,0.2); color: #cdd6f4; }

        /* Chat Messages */
        .chat-messages {
            flex: 1; overflow-y: auto; padding: 16px 14px;
            background: var(--bg-secondary); scroll-behavior: smooth; transition: background 0.3s;
        }
        .chat-messages::-webkit-scrollbar { width: 5px; }
        .chat-messages::-webkit-scrollbar-track { background: transparent; }
        .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .message { display: flex; gap: 8px; margin-bottom: 14px; animation: fadeInUp 0.3s ease; }
        @keyframes fadeInUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
        .message.bot { align-items: flex-start; }
        .message.user { flex-direction: row-reverse; }

        .msg-avatar {
            width: 30px; height: 30px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; font-size: 13px;
        }
        .message.bot .msg-avatar { background: var(--accent); color: #fff; }
        [data-theme="dark"] .message.bot .msg-avatar { background: #313244; color: #89b4fa; }
        .message.user .msg-avatar { background: #6554c0; color: #fff; }

        .msg-bubble {
            max-width: 84%; padding: 11px 14px; border-radius: 14px;
            font-size: 13px; line-height: 1.55; color: var(--text-primary); transition: all 0.3s;
        }
        .message.bot .msg-bubble {
            background: var(--bot-bubble); border: 1px solid var(--bot-bubble-border);
            border-top-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.03);
        }
        .message.user .msg-bubble {
            background: var(--user-bubble); color: #fff; border-top-right-radius: 4px; border: none;
        }
        .msg-bubble strong { font-weight: 600; }

        .msg-bubble .step-card {
            background: var(--step-bg); border-radius: 8px; padding: 9px 12px;
            margin: 6px 0; border-left: 3px solid var(--accent);
        }
        .msg-bubble .step-num {
            display: inline-flex; width: 20px; height: 20px; border-radius: 50%;
            background: var(--accent); color: #fff; font-size: 10px; font-weight: 600;
            align-items: center; justify-content: center; margin-right: 7px; flex-shrink: 0;
        }
        .msg-bubble .step-row { display: flex; align-items: flex-start; margin-bottom: 3px; }

        .msg-bubble .tip-box {
            background: var(--tip-bg); border: 1px solid var(--tip-border); border-radius: 8px;
            padding: 7px 10px; margin-top: 6px; font-size: 12px; display: flex; align-items: flex-start; gap: 7px;
        }
        .msg-bubble .tip-box i { color: #ff991f; margin-top: 2px; }

        .msg-bubble .info-box {
            background: var(--info-bg); border: 1px solid var(--info-border); border-radius: 8px;
            padding: 7px 10px; margin-top: 6px; font-size: 12px;
        }

        .msg-bubble .role-tag {
            display: inline-flex; padding: 1px 7px; background: var(--tag-bg); color: var(--tag-color);
            border-radius: 4px; font-size: 11px; font-weight: 500; margin: 1px 1px;
        }
        .msg-bubble .channel-green { color: #006644; background: #e3fcef; }
        .msg-bubble .channel-orange { color: #974f0c; background: #fff4e5; }
        .msg-bubble .channel-red { color: #bf2600; background: #ffebe6; }
        [data-theme="dark"] .msg-bubble .channel-green { color: #a6e3a1; background: #1a3a2a; }
        [data-theme="dark"] .msg-bubble .channel-orange { color: #fab387; background: #3a2a1a; }
        [data-theme="dark"] .msg-bubble .channel-red { color: #f38ba8; background: #3a1a1a; }

        .msg-bubble .field-list { margin: 4px 0; padding-left: 16px; }
        .msg-bubble .field-list li { margin-bottom: 2px; font-size: 12.5px; }
        .msg-bubble .field-list li.mandatory::after { content: " *"; color: #e53935; font-weight: 700; }

        /* Quick Buttons */
        .quick-buttons { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 10px; }
        .quick-btn {
            display: inline-flex; align-items: center; gap: 6px; padding: 8px 13px;
            background: var(--bg-primary); border: 1.5px solid var(--accent); border-radius: 20px;
            font-size: 12px; font-weight: 500; color: var(--accent); cursor: pointer;
            transition: all 0.2s; font-family: 'Inter', sans-serif;
        }
        .quick-btn:hover {
            background: var(--accent); color: #fff;
            transform: translateY(-1px); box-shadow: 0 3px 10px rgba(0,82,204,0.25);
        }
        .quick-btn i { font-size: 11px; }

        .sub-buttons { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
        .sub-btn {
            padding: 6px 12px; background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 8px; font-size: 11.5px; color: var(--text-secondary); cursor: pointer;
            transition: all 0.2s; font-family: 'Inter', sans-serif; font-weight: 500;
        }
        .sub-btn:hover { background: var(--tag-bg); border-color: var(--accent); color: var(--accent); }

        /* Typing */
        .typing-indicator { display: flex; gap: 4px; padding: 4px 0; }
        .typing-indicator span {
            width: 6px; height: 6px; background: var(--text-secondary); border-radius: 50%;
            animation: typingBounce 1.4s infinite;
        }
        .typing-indicator span:nth-child(2) { animation-delay: .2s; }
        .typing-indicator span:nth-child(3) { animation-delay: .4s; }
        @keyframes typingBounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

        /* Input Area */
        .chat-input-area {
            padding: 12px 14px; background: var(--bg-primary); border-top: 1px solid var(--border-light);
            display: flex; gap: 8px; align-items: center; transition: all 0.3s;
        }
        .chat-input-area input {
            flex: 1; border: 1.5px solid var(--input-border); border-radius: 12px;
            padding: 10px 14px; font-size: 13px; font-family: 'Inter', sans-serif;
            color: var(--text-primary); background: var(--input-bg); outline: none; transition: all 0.2s;
        }
        .chat-input-area input:focus { border-color: var(--accent); }
        .chat-input-area input::placeholder { color: var(--text-secondary); opacity: 0.6; }

        .send-btn {
            width: 40px; height: 40px; border-radius: 12px;
            background: var(--accent); border: none; color: #fff; font-size: 15px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; flex-shrink: 0;
        }
        .send-btn:hover { transform: scale(1.05); box-shadow: 0 3px 10px rgba(0,82,204,0.35); }

        @media (max-width: 560px) {
            body { padding: 0; }
            .chatbot-container { max-width: 100%; height: 100vh; max-height: 100vh; border-radius: 0; }
        }
    </style>
</head>
<body>
    <div class="chatbot-container" id="chatContainer">
        <div class="chat-header">
            <div class="bot-avatar"><i class="fas fa-road"></i></div>
            <div class="header-info">
                <h1>ROW & Demand Note Assistant</h1>
                <p><span class="online-dot"></span> Online</p>
            </div>
            <div class="header-actions">
                <button class="header-btn" onclick="goBack()" title="Back"><i class="fas fa-arrow-left"></i></button>
                <button class="header-btn" onclick="clearChat()" title="Clear Chat"><i class="fas fa-trash-can"></i></button>
                <button class="header-btn" onclick="toggleTheme()" title="Toggle Dark/Light" id="themeBtn"><i class="fas fa-moon"></i></button>
            </div>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="Type a question..." autocomplete="off">
            <button class="send-btn" onclick="handleUserInput()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        let navHistory = [];

        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleUserInput(); });

        // ==================== KNOWLEDGE BASE ====================
        const flows = {

            // ========== ROW AUTHORITY CREATION & RATE UPDATE ==========
            authority_rate: {
                welcome: `Here is information on <strong>ROW Authority Creation & Rate Maintenance</strong>. Please select an option:`,
                sub_options: [
                    { label: "Create ROW Authority", action: "authority_create" },
                    { label: "Vendor Contract Mapping", action: "authority_vendor" },
                    { label: "Manage Authority Cost", action: "rate_update" }
                ]
            },
            authority_create: {
                response: `Here's how to <strong>create a ROW Authority</strong>:<br><span class="role-tag">Role: ROW Executive</span> &nbsp; <span class="role-tag">System: K2 (Web)</span>

<div class="step-card"><div class="step-row"><span class="step-num">1</span><span>Click on <strong>"Manage Authority"</strong> tab on the <strong>PUBLIC ROW</strong> main tile on the K2 screen.</span></div></div>

<div class="step-card"><div class="step-row"><span class="step-num">2</span><span>On the Manage Authority page, click <strong>"Add Authority"</strong> to create a New authority or update an Existing authority.</span></div></div>

<div class="step-card"><div class="step-row"><span class="step-num">3</span><span><strong>For New Authority:</strong> Under the <em>Unregistered Authority</em> tab, fill in:<ul class="field-list">
<li class="mandatory">Authority Category</li>
<li class="mandatory">Authority Name</li>
<li class="mandatory">Authority Address</li>
<li class="mandatory">JIO State Mapping</li>
<li class="mandatory">MP Mapping</li>
</ul>Click <strong>"Save Authority"</strong>.</span></div></div>

<div class="step-card"><div class="step-row"><span class="step-num">4</span><span><strong>For Existing Authority:</strong> Under the <em>Registered Authority</em> tab, search and select the authority. Fill in Authority Category, Name, Address, add JIO State & MP Mapping, and click <strong>"Save Authority"</strong>.</span></div></div>

<div class="step-card"><div class="step-row"><span class="step-num">5</span><span>Confirm the mapping in the popup dialog. The system displays <em>"Authority Saved Successfully"</em>.</span></div></div>

<div class="tip-box"><i class="fas fa-lightbulb"></i><span>After saving, the authority must be mapped to GL Code & Contract Type. See <strong>Vendor Contract Mapping</strong>.</span></div>`,
                sub_options: [
                    { label: "Vendor Contract Mapping", action: "authority_vendor" },
                    { label: "Manage Authority Cost", action: "rate_update" },
                    { label: "Back to Main Menu", action: "home" }
                ]
            },
            authority_vendor: {
                response: `Here's how to do <strong>Vendor Contract Type Mapping</strong>:<br><span class="role-tag">Role: ROW Executive</span> &nbsp; <span class="role-tag">System: K2 (Web)</span>

<div class="step-card"><div class="step-row"><span class="step-num">1</span><span>On the Authority Details page, click <strong>"Manage Authority Vendor ContractType Mapping"</strong>.</span></div></div>

<div class="step-card"><div class="step-row"><span class="step-num">2</span><span>Map the Authority to the appropriate <strong>GL Code</strong> and <strong>Contract Type</strong>.</span></div></div>

<div class="step-card"><div class="step-row"><span class="step-num">3</span><span>Review the mapping details — Authority Category, Authority Name, Address, Contract Type, and Vendor.</span></div></div>

<div class="info-box">This mapping is required to specify ROW charges under different authority categories and GL accounts.</div>`,
                sub_options: [
                    { label: "Create ROW Authority", action: "authority_create" },
                    { label: "Manage Authority Cost", action: "rate_update" },
                    { label: "Back to Main Menu", action: "home" }
                ]
            },
            rate_update: {
                response: `Here's how to <strong>manage Authority Cost</strong>:<br><span class="role-tag">Role: State FC&A Lead</span> &nbsp; <span class="role-tag">System: K2 (Web)</span>

<div class="step-card"><div class="step-row"><span class="step-num">1</span><span>Navigate to <strong>"Manage Authority Cost"</strong> and select the Authority.</span></div></div>

<div class="step-card"><div class="step-row"><span class="step-num">2</span><span>The <strong>Authority Methodology Mapping</strong> page shows existing configurations with Authority Name, Methodology, Construction Type, Ownership, and Approved Status.</span></div></div>

<div class="step-card"><div class="step-row"><span class="step-num">3</span><span>Fill in the <strong>Rate Configuration</strong>:<ul class="field-list">
<li class="mandatory">Methodology (Aerial, Common, Crossing, HDD, Micro Trenching, Moling, Open Trenching, UG)</li>
<li class="mandatory">Construction Type (HDD, MT, OT)</li>
<li class="mandatory">Ownership (OWN, LEASED)</li>
<li class="mandatory">Fixed Charges</li>
<li>Fixed Charges Higher Variance (%)</li>
<li>Fixed Charges Lower Variance (% in Negative)</li>
<li>Recurring Charges</li>
<li>Recurring Charges Escalation (%)</li>
<li>Discount (%)</li>
</ul></span></div></div>

<div class="step-card"><div class="step-row"><span class="step-num">4</span><span>Click <strong>"Add"</strong> to save the cost configuration.</span></div></div>

<div class="tip-box"><i class="fas fa-lightbulb"></i><span>The cost will remain in <strong>Pending</strong> status until approved by the <span class="role-tag">State FC&A Head</span>.</span></div>

<br><strong>Approve Authority Cost</strong><br><span class="role-tag">Role: State FC&A Head</span>

<div class="step-card"><div class="step-row"><span class="step-num">5</span><span>Navigate to <strong>K2</strong> → <strong>PUBLIC ROW</strong> → <strong>Manage Authority Cost</strong>. The <span class="role-tag">State FC&A Head</span> reviews the ROW cost configurations submitted by State FC&A Lead.</span></div></div>

<div class="step-card"><div class="step-row"><span class="step-num">6</span><span>Review the rate details — Methodology, Construction Type, Ownership, Fixed Charges, Recurring Charges, Variance percentages, etc.</span></div></div>

<div class="step-card"><div class="step-row"><span class="step-num">7</span><span>Click <strong>"Approve"</strong> to finalize the rates. The Approved Status changes from Pending to Approved.</span></div></div>`,
                sub_options: [
                    { label: "Back to Authority Menu", action: "authority_rate" },
                    { label: "Back to Main Menu", action: "home" }
                ]
            },

            // ========== ROW APPLICATION CREATION & PROCESSING ==========
            application: {
                welcome: `Here is information on <strong>ROW Application Creation & Processing</strong>. Please select an option:`,
                sub_options: [
                    { label: "Create ROW Application", action: "app_create" },
                    { label: "Update Authority / Span Split", action: "app_span_split" },
                    { label: "Map SPAN to Multiple Authorities", action: "app_span_mapping" },
                    { label: "Application Processing Fee", action: "app_fee" }
                ]
            },
            app_create: {
                response: `Here's how to <strong>create a ROW Application</strong>:<br><span class="role-tag">Role: ROW Executive</span> &nbsp; <span class="role-tag">System: K2 (Web)</span>

<div class="step-card"><div class="step-row"><span class="step-num">1</span><span>Click on <strong>"Manage ROW Draft Application"</strong> tab on the <strong>PUBLIC ROW</strong> main tile on the K2 screen.</span></div></div>

<div class="step-card"><div class="step-row"><span class="step-num">2</span><span>Select <strong>DIT</strong> or <strong>NON DIT</strong> Draft Application.</span></div></div>

<div class="step-card"><div class="step-row"><span class="step-num">3</span><span>Search for <strong>Link</strong> by selecting Phase, Jio State, Political State, MP, Authority Category, Authority, Network Category, and Network Type.</span></div></div>

<div class="step-card"><div class="step-row"><span class="step-num">4</span><span>Click <strong>"Get Details"</strong> — SPAN, CROSSING, and POLE details eligible for ROW will be displayed with Feature ID, Length, UOM, Construction Type, and Construction Methodology.</span></div></div>

<div class="step-card"><div class="step-row"><span class="step-num">5</span><span>Select the required <strong>SPAN segments</strong> (tick checkboxes) and click <strong>"Generate Application"</strong>.</span></div></div>

<div class="step-card"><div class="step-row"><span class="step-num">6</span><span>A success message appears with the <strong>Application ID</strong>. Click OK.</span></div></div>

<div class="tip-box"><i class="fas fa-lightbulb"></i><span>Spans can be <strong>split</strong>, <strong>authority updated</strong>, or <strong>applications merged</strong> before generating the final application.</span></div>

<br><strong>Merge Applications</strong><br><span class="role-tag">Role: ROW Executive</span> &nbsp; <span class="role-tag">System: K2 (Web)</span>

<div class="step-card"><div class="step-row"><span class="step-num">7</span><span>On the K2 Home page, go to <strong>PUBLIC ROW</strong> section and click <strong>"Manage Application OneFiber"</strong>.</span></div></div>

<div class="step-card"><div class="step-row"><span class="step-num">8</span><span>Select the <strong>multiple applications</strong> to be merged.</span></div></div>

<div class="step-card"><div class="step-row"><span class="step-num">9</span><span>Click the <strong>Merge</strong> option to combine them into a single application and generate the final application.</span></div></div>

<div class="tip-box"><i class="fas fa-lightbulb"></i><span>Merging is useful when multiple span segments under the same authority need to be submitted as a single application.</span></div>

<br><strong>Application Acknowledgement</strong><br><span class="role-tag">Role: ROW Executive</span> &nbsp; <span class="role-tag">System: K2 (Web)</span>

<div class="step-card"><div class="step-row"><span class="step-num">10</span><span>After application creation, a <strong>"Submit App Acknowledgement Details"</strong> task is automatically assigned in the Task List.</span></div></div>

<div class="step-card"><div class="step-row"><span class="step-num">11</span><span>Open the task and review the application details.</span></div></div>

<div class="step-card"><div class="step-row"><span class="step-num">12</span><span>Fill in the required acknowledgement details for application submission and <strong>submit</strong>.</span></div></div>

<br><strong>Joint Survey Details</strong><br><span class="role-tag">Role: ROW Executive</span> &nbsp; <span class="role-tag">System: K2 (Web)</span>

<div class="step-card"><div class="step-row"><span class="step-num">13</span><span>A <strong>"Capture Joint Survey Details"</strong> task appears in the Task List after application acknowledgement.</span></div></div>

<div class="step-card"><div class="step-row"><span class="step-num">14</span><span>Open the task — the Joint Survey Findings form shows pre-filled details. Fill in:<ul class="field-list">
<li>App. Ref. No. (pre-filled)</li>
<li>Authority Name (pre-filled)</li>
<li>App. Length in Mtrs (pre-filled)</li>
<li>App. Crossing Nos. (pre-filled)</li>
<li class="mandatory">Date of Joint Survey</li>
<li class="mandatory">Survey Finding Document (PDF upload)</li>
<li>Remarks</li>
</ul></span></div></div>

<strong>DIT</strong> – Department of Information Technology<br>
<strong>SCO</strong> – State Circle Office<br>
<strong>FC&A</strong> – Finance, Costing & Accounts<br>
<strong>MP</strong> – Maintenance Point<br>
<strong>HDD</strong> – Horizontal Directional Drilling<br>
<strong>UG</strong> – Underground (Construction Method)<br>
<strong>NLD</strong> – National Long Distance<br>
<strong>SHQ</strong> – State Headquarters<br>
<strong>NHQ</strong> – National Headquarters<br>
<strong>DN</strong> – Demand Note<br>
<strong>BG</strong> – Bank Guarantee<br>
<strong>SD</strong> – Security Deposit<br>
<strong>NOC</strong> – No Objection Certificate<br>
<strong>SAP</strong> – Systems, Applications & Products<br>
<strong>REIMS</strong> – Real Estate Information Management System<br>
<strong>GL</strong> – General Ledger<br>
<strong>DMS</strong> – Document Management System<br>
<strong>MT</strong> – Micro Trenching<br>
<strong>OT</strong> – Open Trenching<br>
<strong>DD</strong> – Demand Draft
</div>`,
                sub_options: [
                    { label: "Roles & Tasks", action: "roles_tasks" },
                    { label: "Back to Main Menu", action: "home" }
                ]
            }
        };

        // ==================== MAIN MENU ====================
        const mainMenuOptions = [
            { label: '<i class="fas fa-key"></i> Get Access', action: 'get_access' },
            { label: '<i class="fas fa-building"></i> ROW Authority Creation & Rate Update', action: 'authority_rate' },
            { label: '<i class="fas fa-file-lines"></i> ROW Application & Processing', action: 'application' },
            { label: '<i class="fas fa-file-invoice"></i> Demand Note Creation', action: 'dn_creation' },
            { label: '<i class="fas fa-check-double"></i> DN Approval & Payment', action: 'dn_approval' },
            { label: '<i class="fas fa-book"></i> Roles & Glossary', action: 'roles_glossary' }
        ];

        // ==================== CHAT FUNCTIONS ====================
        function appendMessage(content, isBot) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isBot ? 'bot' : 'user'}`;
            const avatar = document.createElement('div');
            avatar.className = 'msg-avatar';
            avatar.innerHTML = isBot ? '<i class="fas fa-road"></i>' : '<i class="fas fa-user"></i>';
            const bubble = document.createElement('div');
            bubble.className = 'msg-bubble';
            bubble.innerHTML = content;
            msgDiv.appendChild(avatar);
            msgDiv.appendChild(bubble);
            chatMessages.appendChild(msgDiv);
            scrollToBottom();
        }

        function addMessage(content, isBot = true, withTyping = true, callback = null) {
            if (withTyping && isBot) {
                showTypingIndicator();
                const delay = 500 + Math.random() * 300;
                setTimeout(() => {
                    removeTypingIndicator();
                    appendMessage(content, isBot);
                    if (callback) callback();
                }, delay);
            } else {
                appendMessage(content, isBot);
                if (callback) callback();
            }
        }

        function addButtons(options, isMainMenu = false) {
            showTypingIndicator();
            setTimeout(() => {
                removeTypingIndicator();
                const msgDiv = document.createElement('div');
                msgDiv.className = 'message bot';
                const avatar = document.createElement('div');
                avatar.className = 'msg-avatar';
                avatar.innerHTML = '<i class="fas fa-road"></i>';
                const bubble = document.createElement('div');
                bubble.className = 'msg-bubble';
                const btnContainer = document.createElement('div');
                btnContainer.className = isMainMenu ? 'quick-buttons' : 'sub-buttons';
                options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = isMainMenu ? 'quick-btn' : 'sub-btn';
                    btn.innerHTML = opt.label;
                    btn.onclick = () => handleAction(opt.action, opt.label);
                    btnContainer.appendChild(btn);
                });
                bubble.appendChild(btnContainer);
                msgDiv.appendChild(avatar);
                msgDiv.appendChild(bubble);
                chatMessages.appendChild(msgDiv);
                scrollToBottom();
            }, 250);
        }

        function showTypingIndicator() {
            if (document.getElementById('typingIndicator')) return;
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message bot'; msgDiv.id = 'typingIndicator';
            const avatar = document.createElement('div');
            avatar.className = 'msg-avatar';
            avatar.innerHTML = '<i class="fas fa-road"></i>';
            const bubble = document.createElement('div');
            bubble.className = 'msg-bubble';
            bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
            msgDiv.appendChild(avatar); msgDiv.appendChild(bubble);
            chatMessages.appendChild(msgDiv); scrollToBottom();
        }

        function removeTypingIndicator() {
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }

        function scrollToBottom() {
            setTimeout(() => { chatMessages.scrollTop = chatMessages.scrollHeight; }, 50);
        }

        // ==================== ACTION HANDLERS ====================
        function handleAction(action, label) {
            if (label && action !== 'home') {
                appendMessage(label.replace(/<[^>]*>/g, '').trim(), false);
            }

            navHistory.push(action);

            if (action === 'home') {
                appendMessage("Main menu", false);
                showMainMenu();
                return;
            }

            const flow = flows[action];
            if (!flow) return;

            if (flow.directResponse && flow.response) {
                addMessage(flow.response, true, true, () => {
                    if (flow.sub_options) addButtons(flow.sub_options);
                });
            } else if (flow.welcome) {
                addMessage(flow.welcome, true, true, () => {
                    if (flow.sub_options) addButtons(flow.sub_options);
                });
            } else if (flow.response) {
                addMessage(flow.response, true, true, () => {
                    if (flow.sub_options) addButtons(flow.sub_options);
                });
            }
        }

        function showMainMenu() {
            addMessage(`Welcome! Please choose a topic below or type a question.`, true, true, () => {
                addButtons(mainMenuOptions, true);
            });
        }

        // ==================== HEADER ACTIONS ====================
        function clearChat() {
            chatMessages.innerHTML = '';
            navHistory = [];
            showMainMenu();
        }

        function goBack() {
            if (navHistory.length > 1) {
                navHistory.pop(); // remove current
                const prev = navHistory.pop(); // get previous
                handleAction(prev, null);
            } else {
                clearChat();
            }
        }

        function toggleTheme() {
            const container = document.getElementById('chatContainer');
            const btn = document.getElementById('themeBtn');
            if (document.documentElement.getAttribute('data-theme') === 'dark') {
                document.documentElement.removeAttribute('data-theme');
                btn.innerHTML = '<i class="fas fa-moon"></i>';
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                btn.innerHTML = '<i class="fas fa-sun"></i>';
            }
        }

        // ==================== TEXT INPUT HANDLER ====================
        function handleUserInput() {
            const text = userInput.value.trim();
            if (!text) return;
            appendMessage(text, false);
            userInput.value = '';
            const lower = text.toLowerCase();

            if (lower.includes('access') || lower.includes('login') || lower.includes('register') || lower.includes('sign up')) {
                handleAction('get_access', null);
            } else if (lower.includes('role') && lower.includes('task')) {
                handleAction('roles_tasks', null);
            } else if (lower.includes('glossary') || lower.includes('abbreviat') || lower.includes('full form')) {
                handleAction('glossary', null);
            } else if (lower.includes('role')) {
                handleAction('roles_glossary', null);
            } else if (lower.includes('authority') && (lower.includes('creat') || lower.includes('add'))) {
                handleAction('authority_create', null);
            } else if (lower.includes('authority') && lower.includes('cost')) {
                handleAction('rate_update', null);
            } else if (lower.includes('vendor') && lower.includes('contract')) {
                handleAction('authority_vendor', null);
            } else if (lower.includes('authority') && (lower.includes('manage') || lower.includes('rate') || lower.includes('maintenance'))) {
                handleAction('authority_rate', null);
            } else if (lower.includes('authority')) {
                handleAction('authority_rate', null);
            } else if (lower.includes('rate') || lower.includes('cost') || lower.includes('methodology')) {
                handleAction('rate_update', null);
            } else if (lower.includes('application') && (lower.includes('creat') || lower.includes('generat') || lower.includes('draft'))) {
                handleAction('application', null);
            } else if (lower.includes('span') && (lower.includes('map') || lower.includes('multiple authorit'))) {
                handleAction('app_span_mapping', null);
            } else if (lower.includes('span') && (lower.includes('split') || lower.includes('update'))) {
                handleAction('app_span_split', null);
            } else if (lower.includes('merge')) {
                handleAction('app_merge', null);
            } else if (lower.includes('acknowledgement') || lower.includes('ack')) {
                handleAction('app_ack', null);
            } else if (lower.includes('joint survey') || lower.includes('survey')) {
                handleAction('app_survey', null);
            } else if (lower.includes('processing fee') || lower.includes('application fee')) {
                handleAction('app_fee', null);
            } else if (lower.includes('demand note') && (lower.includes('creat') || lower.includes('upload') || lower.includes('new') || lower.includes('supplementary'))) {
                handleAction('dn_creation', null);
            } else if (lower.includes('checklist') || lower.includes('channel') || lower.includes('green') || lower.includes('orange') || lower.includes('red channel')) {
                handleAction('dn_approval', null);
            } else if ((lower.includes('approval') || lower.includes('approve')) && (lower.includes('dn') || lower.includes('demand'))) {
                handleAction('dn_approval', null);
            } else if (lower.includes('payment') && (lower.includes('dn') || lower.includes('demand'))) {
                handleAction('dn_approval', null);
            } else if (lower.includes('permission') || lower.includes('noc') || lower.includes('refund')) {
                handleAction('dn_approval', null);
            } else if (lower.includes('executor')) {
                handleAction('dn_approval', null);
            } else if (lower.includes('demand note') || lower.includes('demand') || lower.includes(' dn ') || lower === 'dn') {
                handleAction('dn_creation', null);
            } else if (lower.includes('row application') || lower.includes('row app') || lower.includes('application')) {
                handleAction('application', null);
            } else if (lower.includes('bg') && (lower.includes('return') || lower.includes('guarantee'))) {
                handleAction('dn_approval', null);
            } else if (lower.includes('hello') || lower.includes('hi') || lower.includes('hey') || lower.includes('help') || lower.includes('menu') || lower.includes('start')) {
                showMainMenu();
            } else {
                addMessage(`That topic was not found. Here are the available topics — please select one to get started:`, true, true, () => {
                    addButtons(mainMenuOptions, true);
                });
            }
        }

        // ==================== INIT ====================
        window.onload = () => { showMainMenu(); };
    </script>
</body>
</html>
